name: Build and Deploy CV

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-cv-image .

      - name: Copy PDF
        run: |
          docker create --name cv-container my-cv-image
          docker cp cv-container:/cv/main.pdf ./main.pdf
          docker rm cv-container

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: main.pdf

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: false